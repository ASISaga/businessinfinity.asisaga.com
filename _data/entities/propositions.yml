network-enterprise:
  uid: network-enterprise
  _type: network_proposition
  headline: The network shift
  audience: [enterprise]
  body: >
    When your suppliers, plants, channels, and partners run Infinity:
    capacity reroutes to where it creates the most value now, capital
    flows with the same intelligence, and everyone sees the same "now" —
    acting without waiting for you to convene.
  pills:
    - uid: pill-zero-latency
      text: Zero‑latency negotiation
    - uid: pill-shared-sims
      text: Shared scenario sims
    - uid: pill-crisis-routing
      text: Crisis re‑routing
  footnote: "This isn't alignment. It's self‑alignment at network scale."

network-startup:
  uid: network-startup
  _type: network_proposition
  headline: The network you join
  audience: [startup]
  body: >
    Every Infinity‑run startup feeds into a commons: anonymised patterns,
    tested playbooks, battle‑proven evaluators. Your boardroom learns
    from theirs; theirs learns from yours.
  pills:
    - uid: pill-funding-plays
      text: Shared funding plays
    - uid: pill-gtm-moves
      text: Proven GTM moves
    - uid: pill-hiring
      text: Hiring that sticks
