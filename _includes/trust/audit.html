<section id="audit" class="section reveal">
    <h2>{{ site.data.trust.audit.heading }}</h2>
    <div class="card">
        <ul>
            {% for item in site.data.trust.audit.items %}
            <li data-scope="{{ item.scope }}">{{ item.text }}</li>
            {% endfor %}
        </ul>
    </div>
</section>
