header:
  _meta:
    content_type: hero_header
    intent: orient
    audience: [enterprise, startup, investor]
    funnel_stage: awareness
  brand: Business Infinity
  tagline: Persistent AI boardroom for compounding decision power across ERP, MES,
    CRM, and SaaS
  theme_btn_label: Toggle theme
  print_btn_label: Print / PDF
  cta:
    label: Talk to us
    url: '#contact'

problem:
  _meta:
    content_type: problem_statement
    intent: empathise
    audience: [enterprise, startup]
    funnel_stage: awareness
    priority: critical
  heading: The Problem
  body: Strategy is too often episodic and siloed — C‑suites deliberate in bursts,
    decisions live in decks, and learning is local instead of compounding across time
    and teams.

solution:
  _meta:
    content_type: solution_statement
    intent: persuade
    audience: [enterprise, startup]
    funnel_stage: awareness
    priority: critical
    relates_to: [problem]
  heading: The Solution
  brand: Business Infinity
  body: 'creates a persistent AI boardroom: domain‑tuned C‑suite agents deliberating
    in context, acting directly across ERP, MES, CRM, and SaaS, and learning continuously.
    Each cycle enriches the agents'' domain models, compounding decision‑making capability
    for the next.'

components:
  _meta:
    content_type: component_list
    intent: inform
    audience: [enterprise, startup]
    funnel_stage: consideration
  heading: Core Components
  items:
  - text: Domain‑tuned C‑suite AI agents
    _type: platform_component
    domain: agent_engine
  - text: Persistent deliberation memory and decision ledger
    _type: platform_component
    domain: memory
  - text: Live data integration with enterprise systems
    _type: platform_component
    domain: integration
  - text: Governance‑by‑protocol for transparent decision‑flow
    _type: platform_component
    domain: governance

canvas:
  _meta:
    content_type: process_overview
    intent: inform
    audience: [enterprise, startup]
    funnel_stage: consideration
  heading: Boardroom Canvas
  body: 'Our operational blueprint: clarify charter → surface intelligence → deliberate
    in agentic quorum → decide via governance protocol → act directly in connected
    systems → learn → repeat, compounding insight and capability.'

architecture:
  _meta:
    content_type: architecture_overview
    intent: inform
    audience: [enterprise]
    funnel_stage: decision
  heading: Architecture
  body: Modular agent clusters for each C‑suite role; API mesh linking into ERP/MES/CRM;
    secure audit logging; feedback loops to retrain domain models based on decision
    outcomes.

deployment:
  _meta:
    content_type: deployment_note
    intent: reassure
    audience: [enterprise, investor]
    funnel_stage: decision
  heading: Deployment at ASI Saga
  body: 'Our proving ground: live deployment inside ASI Saga as both first customer
    and perpetual testbed. Every decision here feeds into the refinement of boardroom
    protocols and agent behaviours.'

gtm:
  _meta:
    content_type: go_to_market
    intent: inform
    audience: [investor, enterprise]
    funnel_stage: decision
  heading: Go‑To‑Market
  body: We start with founder‑led enterprises hungry for strategic leverage. Each
    onboarded boardroom becomes a node in the Business Infinity network, contributing
    insight to the commons.

security:
  _meta:
    content_type: trust_assurance
    intent: reassure
    audience: [enterprise]
    funnel_stage: decision
    priority: high
  heading: Security & Governance
  body: Role‑based access, encrypted deliberation logs, protocol‑level decision capture,
    and compliance with enterprise security requirements from day one.

network:
  _meta:
    content_type: network_effect
    intent: persuade
    audience: [enterprise, startup]
    funnel_stage: consideration
  heading: Network Effects
  body: Every decision improves not just one boardroom but the network — insights
    propagate, models upgrade, and the collective capability compounds.

roadmap:
  _meta:
    content_type: roadmap
    intent: inform
    audience: [investor, enterprise]
    funnel_stage: decision
  heading: Roadmap
  items:
  - text: Complete ASI Saga showcase deployment
    _type: milestone
    status: in_progress
    phase: 1
  - text: Onboard first external pilot customers
    _type: milestone
    status: planned
    phase: 2
  - text: Establish shared decision commons
    _type: milestone
    status: planned
    phase: 3
  - text: Scale to cross‑industry network of persistent AI boardrooms
    _type: milestone
    status: planned
    phase: 4

faq:
  _meta:
    content_type: faq
    intent: inform
    audience: [enterprise, startup, entrepreneur]
    funnel_stage: consideration
  heading: FAQ
  question: How is this different from a normal dashboard?
  answer: Dashboards inform; Business Infinity deliberates, decides, and acts — continuously
    and in context.
