{% assign s = include.section.source %}
<section id="roadmap">
    <h3>{{ s.heading }}</h3>
    <div class="card">
        <ol>
            {% for item in s.items %}
            <li data-status="{{ item.status }}" data-phase="{{ item.phase }}">{{ item.text }}</li>
            {% endfor %}
        </ol>
    </div>
</section>
