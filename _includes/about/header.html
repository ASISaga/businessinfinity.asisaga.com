<header>
    <div class="wrap mast">
        <div class="brand">
            <div class="logo" aria-hidden="true"></div>
            <div>
                <h1>{{ site.data.about.header.brand }}</h1>
                <div class="tagline">{{ site.data.about.header.tagline }}</div>
            </div>
        </div>
        <div class="actions">
            <button id="themeBtn" title="{{ site.data.about.header.theme_btn_label }}">{{ site.data.about.header.theme_btn_label }}</button>
            <button id="printBtn" title="{{ site.data.about.header.print_btn_label }}">{{ site.data.about.header.print_btn_label }}</button>
            <a class="btn btn-primary" href="{{ site.data.about.header.cta.url }}">{{ site.data.about.header.cta.label }}</a>
        </div>
    </div>
</header>
