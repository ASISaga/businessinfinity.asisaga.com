technova-case-study:
  uid: technova-case-study
  _type: case_study
  title: How TechNova Accelerated Their Growth
  description: >
    TechNova, a SaaS startup in the project management space, used
    Business Infinity to optimize their operations and growth strategy.
  results:
    - uid: technova-cost
      _type: measurable_outcome
      text: Reduced operational costs by 35%
      metric_category: cost
      improvement: "35%"
    - uid: technova-growth
      _type: measurable_outcome
      text: Increased customer acquisition rate by 42%
      metric_category: growth
      improvement: "42%"
    - uid: technova-funding
      _type: measurable_outcome
      text: Secured Series A funding within 6 months
      metric_category: funding
      timeframe: "6 months"
  quote: >
    Business Infinity helped us identify inefficiencies in our operations
    and provided clear strategies for growth. The AI-powered insights were
    game-changing for our decision-making process.
  attribution: Sarah Chen, CEO of TechNova

