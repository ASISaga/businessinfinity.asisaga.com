  heading: Start with you
  lead: Pick your seat and the outcomes you need this quarter. The boardroom adapts.
  personas:
  - CEO
  - CFO
  - COO
  - CRO
  - CPO
  - CHRO
  objectives:
  - label: Grow ARR
    id: arr
  - label: Lift NRR
    id: nrr
  - label: Reduce cycle time
    id: cycle
  - label: Improve plan adherence
    id: adherence
  - label: Free working capital
    id: wc
  - label: Lower cost‑to‑serve
    id: cost
  - label: Increase forecast accuracy
    id: forecast
  - label: Strengthen hiring quality
    id: talent
  panel_title: 'For the CEO: what changes'
boardroom:
  heading: Perpetual boardroom
  intro: Deliberation never stops. Agents keep a shared, long‑horizon memory; decisions
    are made when the moment is right, not when calendars align.
  features:
  - title: Always‑on awareness
    description: Signals streamed from ERP/MES/CRM/SaaS; agents monitor KPIs, risks,
      and opportunities continuously.
  - title: Quorum deliberation
    description: Agents propose, challenge, and converge under chartered rules — not
      single‑shot replies.
  - title: Action with guardrails
    description: Dry‑runs, approvals, scope caps, and instant rollback. Every write
      is observable and reversible.
  loop_steps:
  - Observe
  - Deliberate
  - Decide
  - Act
  - Measure
  - Learn & update
agents:
  heading: PhD‑grade C‑suite agents
  intro: Each agent embodies expert‑level, evidence‑based domain models — synthesizing
    frontier research, benchmark playbooks, and operator wisdom — calibrated to your
    context.
  roster:
  - name: CEO agent
    scope: Strategy, portfolio, capital allocation
    strength: System‑level trade‑off analysis
    gives: Clarity under uncertainty
  - name: CFO agent
    scope: Forecasts, margins, working capital
    strength: Unit economics & policy checks
    gives: Capital efficiency, clean audit
  - name: COO agent
    scope: Supply, schedules, constraints
    strength: Scenario sims & replans
    gives: Throughput & resilience
  - name: CRO agent
    scope: Pipeline, pricing, retention
    strength: Experiment design & lift
    gives: ARR & NRR growth
  - name: CPO agent
    scope: Sourcing, terms, supplier risk
    strength: Negotiation frames, TCO
    gives: Cost, continuity, quality
  - name: CHRO agent
    scope: Talent, culture, org design
    strength: Engagement, retention, upskilling
    gives: Talent pipeline, culture
unison:
  heading: Unison toward objectives
  body: Agents deliberate as a team, not in isolation. They align on objectives, share
    context, and coordinate actions for compounding results.
ledger:
  heading: Decision ledger & governance
  body: Every decision, rationale, and outcome is logged. Transparent, auditable,
    and ready for review.
network:
  heading: Networked value chains
  body: Each boardroom is a node in a learning network. Insights and models propagate,
    compounding value across the network.
integrations:
  heading: Integrations
  items:
  - title: Read
    body: APIs/SQL, CDC, and events from ERP/MES/CRM/data platform. Semantic layer
      aligns language across domains.
  - title: Write
    body: Idempotent adapters with retries; guarded writes with caps, canary, and
      rollback.
  - title: Identity & policy
    body: SSO/SCIM, ABAC/RBAC, policy engines and residency controls built‑in.
assurance:
  heading: Assurance & safety
  items:
  - title: Charters & limits
    body: Explicit powers and escalation paths per agent. Risk budgets by domain.
  - title: Runtime evaluators
    body: Policy, finance, privacy checks on every decision and action.
  - title: Observability
    body: Decision traces, action telemetry, drift monitors, and alerts.
cta:
  heading: Cross the threshold with a zero‑regret pilot
  body: 4–8 weeks. Read‑only first. Guarded writes where safe. Evidence that pays
    for itself.
  button:
    label: Request a briefing
    url: mailto:hello@businessinfinity.ai
