_schema:
  version: "3.0"
  type: page_manifest
  page_path: /about/
  title: "About | Business Infinity"
  description: "Persistent AI boardroom for compounding decision power across ERP, MES, CRM, and SaaS."
  layout: default

sections:
  - id: header
    component: hero
    intent: orient
    source:
      theme_btn_label: Toggle theme
      print_btn_label: Print / PDF
      cta:
        label: Talk to us
        url: "#contact"

  - id: problem
    component: text-block
    intent: empathise
    entity_collection: concepts
    entity_ref: episodic-strategy
    heading_override: The Problem

  - id: solution
    component: text-block
    intent: persuade
    entity_collection: concepts
    entity_ref: compound-decisions
    source:
      heading: The Solution
      brand: Business Infinity
      body: "creates a persistent AI boardroom: domain‑tuned C‑suite agents deliberating in context, acting directly across ERP, MES, CRM, and SaaS, and learning continuously. Each cycle enriches the agents' domain models, compounding decision‑making capability for the next."

  - id: components
    component: list-section
    intent: inform
    entity_collection: propositions
    entity_ref: platform-components
    heading_override: Core Components

  - id: canvas
    component: text-block
    intent: inform
    entity_collection: concepts
    entity_ref: boardroom-canvas

  - id: architecture
    component: text-block
    intent: inform
    source:
      heading: Architecture
      body: "Modular agent clusters for each C‑suite role; API mesh linking into ERP/MES/CRM; secure audit logging; feedback loops to retrain domain models based on decision outcomes."

  - id: deployment
    component: text-block
    intent: reassure
    source:
      heading: Deployment at ASI Saga
      body: "Our proving ground: live deployment inside ASI Saga as both first customer and perpetual testbed. Every decision here feeds into the refinement of boardroom protocols and agent behaviours."

  - id: gtm
    component: text-block
    intent: inform
    source:
      heading: Go‑To‑Market
      body: "We start with founder‑led enterprises hungry for strategic leverage. Each onboarded boardroom becomes a node in the Business Infinity network, contributing insight to the commons."

  - id: security
    component: text-block
    intent: reassure
    source:
      heading: Security & Governance
      body: "Role‑based access, encrypted deliberation logs, protocol‑level decision capture, and compliance with enterprise security requirements from day one."

  - id: network
    component: text-block
    intent: persuade
    entity_collection: concepts
    entity_ref: network-effects

  - id: roadmap
    component: roadmap
    intent: inform
    source:
      heading: Roadmap
      items:
        - uid: ms-showcase
          text: Complete ASI Saga showcase deployment
          status: in_progress
          phase: 1
        - uid: ms-pilots
          text: Onboard first external pilot customers
          status: planned
          phase: 2
        - uid: ms-commons
          text: Establish shared decision commons
          status: planned
          phase: 3
        - uid: ms-network
          text: Scale to cross‑industry network of persistent AI boardrooms
          status: planned
          phase: 4

  - id: faq
    component: faq
    intent: inform
    source:
      heading: FAQ
      question: How is this different from a normal dashboard?
      answer: "Dashboards inform; Business Infinity deliberates, decides, and acts — continuously and in context."
