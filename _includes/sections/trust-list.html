{% assign s = include.section.source %}
{% assign e = include.entity %}
<section id="{{ include.section.id }}" class="section reveal">
    <h2>{{ s.heading }}</h2>
    <div class="card">
        <ul>
            {% for item in e.items %}
            <li{% if item.scope %} data-scope="{{ item.scope }}"{% endif %}{% if item.layer %} data-layer="{{ item.layer }}"{% endif %}{% if item.right_type %} data-right-type="{{ item.right_type }}"{% endif %}{% if item.mechanism %} data-mechanism="{{ item.mechanism }}"{% endif %}>{{ item.text }}</li>
            {% endfor %}
        </ul>
    </div>
</section>
