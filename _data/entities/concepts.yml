_schema:
  version: "3.0"
  type: entity_collection
  entity_type: concept
  description: >
    Core philosophical and business concepts that underpin the
    Business Infinity narrative. Each concept is a reusable atom
    referenced by page manifests via UID.
  last_reviewed: 2026-04-11

persistent-boardroom:
  uid: persistent-boardroom
  _type: concept
  headline: Persistent Boardroom
  body: >
    Deliberation never stops. Agents keep a shared, long‑horizon memory;
    decisions are made when the moment is right, not when calendars align.
  tags: [boardroom, continuity, memory]

network-effects:
  uid: network-effects
  _type: concept
  headline: Network Effects
  body: >
    Every decision improves not just one boardroom but the network —
    insights propagate, models upgrade, and the collective capability compounds.
  tags: [network, learning, compounding]

compound-decisions:
  uid: compound-decisions
  _type: concept
  headline: Compounding Decision Power
  body: >
    Each cycle enriches the agents' domain models, compounding
    decision‑making capability for the next.
  tags: [learning, compounding, intelligence]

governance-protocol:
  uid: governance-protocol
  _type: concept
  headline: Governance by Protocol
  body: >
    Transparent decision‑flow where every decision, rationale,
    and outcome is logged — auditable and ready for review.
  tags: [governance, transparency, audit]

boardroom-canvas:
  uid: boardroom-canvas
  _type: concept
  headline: Boardroom Canvas
  body: >
    Our operational blueprint: clarify charter → surface intelligence →
    deliberate in agentic quorum → decide via governance protocol → act
    directly in connected systems → learn → repeat, compounding insight
    and capability.
  tags: [process, blueprint, methodology]

episodic-strategy:
  uid: episodic-strategy
  _type: concept
  headline: The Problem — Episodic Strategy
  body: >
    Strategy is too often episodic and siloed — C‑suites deliberate in
    bursts, decisions live in decks, and learning is local instead of
    compounding across time and teams.
  tags: [problem, strategy, silos]

decision-drag:
  uid: decision-drag
  _type: concept
  headline: Decision Drag
  body: >
    The hidden killer isn't just capital; it's decision drag — every
    delayed hand‑off, every re‑decision, every plan that dies before
    the first action.
  tags: [problem, friction, latency]

unison-objectives:
  uid: unison-objectives
  _type: concept
  headline: Unison Toward Objectives
  body: >
    Agents deliberate as a team, not in isolation. They align on objectives,
    share context, and coordinate actions for compounding results.
  tags: [collaboration, alignment, objectives]

decision-ledger:
  uid: decision-ledger
  _type: concept
  headline: Decision Ledger & Governance
  body: >
    Every decision, rationale, and outcome is logged. Transparent,
    auditable, and ready for review.
  tags: [governance, audit, transparency]

networked-value-chains:
  uid: networked-value-chains
  _type: concept
  headline: Networked Value Chains
  body: >
    Each boardroom is a node in a learning network. Insights and
    models propagate, compounding value across the network.
  tags: [network, supply-chain, collaboration]
