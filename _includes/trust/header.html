<!-- Header -->
<header class="site-header">
    <div class="wrap header-inner">
        <div class="brand">
            <div class="logo" aria-hidden="true"></div>
            <div>
                <h1 class="site-title">{{ site.data.trust.header.title }}</h1>
                <div class="site-sub">{{ site.data.trust.header.subtitle }}</div>
            </div>
        </div>
        <div class="header-actions">
            {% for link in site.data.trust.header.nav %}
            <a class="btn btn-quiet" href="{{ link.url }}">{{ link.label }}</a>
            {% endfor %}
        </div>
    </div>
</header>
