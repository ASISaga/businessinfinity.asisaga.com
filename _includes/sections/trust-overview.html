{% assign e = include.entity %}
<section id="overview" class="section reveal">
    <h2>{{ e.heading }}</h2>
    <p class="lead">{{ e.lead }}</p>
    <blockquote class="trust-quote">
        <p><strong>{{ e.quote }}</strong></p>
        <footer>— {{ e.attribution }}</footer>
    </blockquote>
    <p>{{ e.body }}</p>
</section>
