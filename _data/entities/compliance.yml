_schema:
  version: "3.0"
  type: entity_collection
  entity_type: compliance
  description: >
    Compliance, security, privacy, transparency, and audit entities.
    Single source for all trust center content.
  last_reviewed: 2026-04-11

compliance-items:
  uid: compliance-items
  _type: compliance_set
  items:
    - uid: comp-certifications
      _type: certification_set
      text: SOC 2, ISO 27001, GDPR, HIPAA
      scope: regulatory
    - uid: comp-audits
      _type: verification_method
      text: Independent audits and certifications
      scope: assurance
    - uid: comp-monitoring
      _type: operational_practice
      text: Continuous monitoring and reporting
      scope: monitoring

security-items:
  uid: security-items
  _type: security_set
  items:
    - uid: sec-rbac
      _type: security_control
      text: Role-based access control
      layer: access
    - uid: sec-encryption
      _type: security_control
      text: Encryption at rest and in transit
      layer: data
    - uid: sec-vuln-assessment
      _type: security_control
      text: Continuous vulnerability assessment
      layer: monitoring

privacy-items:
  uid: privacy-items
  _type: privacy_set
  items:
    - uid: priv-data-rights
      _type: privacy_right
      text: Data access, correction, and deletion
      right_type: data_subject
    - uid: priv-by-design
      _type: privacy_right
      text: Privacy by design
      right_type: architectural
    - uid: priv-global-laws
      _type: privacy_right
      text: Compliance with global privacy laws
      right_type: regulatory

transparency-items:
  uid: transparency-items
  _type: transparency_set
  items:
    - uid: trans-audit-trails
      _type: transparency_measure
      text: Audit trails for all actions
      mechanism: logging
    - uid: trans-disclosure
      _type: transparency_measure
      text: Open communication on incidents
      mechanism: disclosure
    - uid: trans-access
      _type: transparency_measure
      text: Customer access to logs
      mechanism: self_service

audit-items:
  uid: audit-items
  _type: audit_set
  items:
    - uid: aud-logging
      _type: audit_capability
      text: Comprehensive logging of all actions
      scope: complete
    - uid: aud-immutable
      _type: audit_capability
      text: Immutable records for compliance
      scope: tamper_proof
    - uid: aud-access
      _type: audit_capability
      text: Customer access to audit data
      scope: self_service

trust-overview:
  uid: trust-overview
  _type: trust_statement
  heading: Trust Center
  lead: >
    At Business Infinity, trust is not a marketing claim — it is a
    measurable outcome of transparency, reliability, and accountability.
  quote: Trust is earned through evidence, not claimed through words.
  attribution: Our guiding principle
  body: >
    This Trust Center provides comprehensive information about our
    security, compliance, and privacy practices. Everything here is
    backed by concrete implementation, not just policy documents.
