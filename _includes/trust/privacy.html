<section id="privacy" class="section reveal">
    <h2>{{ site.data.trust.privacy.heading }}</h2>
    <div class="card">
        <ul>
            {% for item in site.data.trust.privacy.items %}
            <li data-right-type="{{ item.right_type }}">{{ item.text }}</li>
            {% endfor %}
        </ul>
    </div>
</section>
