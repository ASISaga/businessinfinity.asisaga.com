<!-- Header -->
<header class="site-header">
    <div class="wrap header-inner">
        <div class="brand">
            <div class="logo" aria-hidden="true"></div>
            <div>
                <h1 class="site-title">{{ site.data.features.header.title }}</h1>
                <div class="site-sub">{{ site.data.features.header.subtitle }}</div>
            </div>
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="btn btn-quiet" aria-pressed="false">{{ site.data.features.header.theme_toggle_label }}</button>
            <a class="btn btn-primary" href="{{ site.data.features.header.cta.url }}">{{ site.data.features.header.cta.label }}</a>
        </div>
    </div>
</header>
