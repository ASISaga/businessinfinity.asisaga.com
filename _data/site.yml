# =============================================================================
# Site Identity — Ontological Knowledge Base (Tier 1)
# =============================================================================
# Purpose: Canonical source of truth for all site-wide identity, brand, and
# meta content. Every UI element that renders site identity MUST reference
# this file via site.data.site.* — never hardcode brand strings.
#
# Required by: theme's _includes/header.html, _includes/footer.html
# =============================================================================

# --- Identity ----------------------------------------------------------------
identity:
  name: "Business Infinity"
  tagline: "Genesis of Artificial Superintelligence"
  abbreviation: "Business Infinity"
  lang: "en-US"

# --- Brand Assets ------------------------------------------------------------
brand:
  logo:
    src: "/assets/images/favicon.ico"
    alt: "Business Infinity logo"
  favicon: "/assets/images/favicon.ico"
  theme_color: "#0b0c18"
