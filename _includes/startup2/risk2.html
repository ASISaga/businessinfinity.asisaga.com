<section class="section" id="risk">
    <div class="wrap">
        <h2 class="h2 reveal">{{ site.data.startup2.risk2.heading }}</h2>
        <ul class="list card reveal">
            {% for item in site.data.startup2.risk2.items %}
            <li><span class="li-lead">{{ item.lead }}</span> {{ item.text }}</li>
            {% endfor %}
        </ul>
        <p class="subtle reveal">{{ site.data.startup2.risk2.footnote }}</p>
    </div>
</section>
