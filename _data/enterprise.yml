hero:
  headline: "Stop managing the gaps"
  subhead: |
    The silent tax isn't in your ERP, MES, CRM, or planning tools.
    It's in the space between them.
  cta_primary:
    label: "Cross the threshold"
    url: "#threshold"
  cta_secondary:
    label: "See how it earns trust"
    url: "#risk"

intro:
  beats:
    - "Every delayed hand‑off."
    - "Every re‑decision."
    - "Every plan that dies before the first action."
  body: >
    Business Infinity closes that space forever. Not with another dashboard —
    with a boardroom that never adjourns.
  accent: "boardroom that never adjourns"

flow:
  heading: "From lag to flow"
  today:
    eyebrow: "Today"
    body: >
      Every function optimises its lane. Decisions crawl toward consensus. By the time the convoy moves,
      the market has shifted.
  tomorrow:
    eyebrow: "Tomorrow"
    items:
      - lead: "Domain agents:"
        text: "CEO, CFO, COO, CRO, CHRO debating in real time."
      - lead: "Guarded actions:"
        text: "Instant writes into ERP/MES/CRM with rollback."
      - lead: "Living ledger:"
        text: "Every trade‑off, decision, and outcome captured."
    closing: "Your enterprise doesn't just act faster. It"
    closing_accent: "remembers faster"
    closing_end: "."

tenets:
  heading: "Three irreversibles"
  items:
    - index: "01"
      text: "A decision is only as good as the moment it's made."
    - index: "02"
      text: "If learning doesn't propagate, it wasn't learning."
    - index: "03"
      text: "Strategy that stops at the org chart isn't strategy — it's theatre."

network:
  heading: "The network shift"
  body: >
    When your suppliers, plants, channels, and partners run Infinity: capacity reroutes to where it creates the
    most value now, capital flows with the same intelligence, and everyone sees the same "now" — acting without
    waiting for you to convene.
  pills:
    - "Zero‑latency negotiation"
    - "Shared scenario sims"
    - "Crisis re‑routing"
  footnote: "This isn't alignment. It's self‑alignment at network scale."

levers:
  heading: "The hard levers"
  items:
    - eyebrow: "Revenue & margin"
      body: "Faster, better allocations in mix, pricing, and fill rate."
    - eyebrow: "Cost‑to‑serve"
      body: "Fewer fire‑drills. Less expedite waste."
    - eyebrow: "Working capital"
      body: "Shorter cycles, lighter inventories, released cash."

risk:
  heading: "Risk is a design variable"
  intro: "Before Infinity ever writes back to your systems, it proves itself under:"
  items:
    - lead: "Read‑only:"
      text: "Simulations and diffs on live data."
    - lead: "Approvals:"
      text: "Segregation of duties and explicit limits."
    - lead: "Rollback:"
      text: "Canary, caps, kill switch."
    - lead: "Audit:"
      text: "Tamper‑evident decision ledger."
  callout: "You don't trust it into production — you"
  callout_accent: "watch it earn its way"
  callout_end: "."

threshold:
  heading: "Your threshold step"
  intro: "One pilot flow. One measurable, high‑friction process:"
  items:
    - eyebrow: "Order‑to‑cash"
      body: "Start with a region or priority segment; measure cycle time, DSO, and SLA lift."
    - eyebrow: "Plant changeover"
      body: "Stabilise windows; reduce variance; protect throughput without overtime spikes."
    - eyebrow: "Supplier lane"
      body: "Capacity and lead‑time realism; fewer expedites; shared sims for what‑ifs."
  footnote: "4–8 weeks. Continuous deliberation, guarded actions, measured deltas in time, service, cost, and cash."
  cta:
    label: "Design your pilot"
    url: "mailto:enterprise@businessinfinity.ai"

invite:
  quote: >
    You've already felt the drag. The question is whether you keep paying it.
    The future is already running — the invitation is to join it.
  back_label: "Back to top"
  back_url: "#skip-target"
