<section class="section" id="threshold">
    <div class="wrap">
        <h2 class="h2 reveal">{{ site.data.startup2.threshold2.heading }}</h2>
        <p class="reveal">{{ site.data.startup2.threshold2.intro }}</p>
        <div class="grid grid-3">
            {% for item in site.data.startup2.threshold2.items %}
            <div class="card reveal">
                <h3 class="eyebrow">{{ item.eyebrow }}</h3>
                <p>{{ item.body }}</p>
            </div>
            {% endfor %}
        </div>
        <div class="cta-center reveal">
            <a href="{{ site.data.startup2.threshold2.cta.url }}" class="btn btn-primary btn-lg">{{ site.data.startup2.threshold2.cta.label }}</a>
        </div>
    </div>
</section>
