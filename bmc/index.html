---
layout: default
title: "Business Infinity — Business Model Canvas"
---

{% assign manifest = site.data.manifests.bmc %}
<header class="page-header">
  <h1>{{ manifest.page_title }}</h1>
  <div class="subtitle">{{ manifest.subtitle }}</div>
</header>

<main>
  {% include manifest-renderer.html manifest=manifest %}

  <section class="actions">
    <button class="primary" onclick="window.print()">Print / Save as PDF</button>
    <button onclick="toggleSample()">Toggle sample content</button>
  </section>
</main>

<script src="{{ '/assets/js/bmc/app.js' | relative_url }}"></script>
