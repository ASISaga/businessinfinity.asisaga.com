<section id="contact" class="section reveal">
    <h2>{{ site.data.trust.contact.heading }}</h2>
    <div class="card">
        <ul>
            {% for item in site.data.trust.contact.items %}
            <li>
                {{ item.label }}:
                {% if item.url %}
                <a href="{{ item.url }}">{{ item.value }}</a>
                {% else %}
                {{ item.value }}
                {% endif %}
            </li>
            {% endfor %}
        </ul>
    </div>
</section>
