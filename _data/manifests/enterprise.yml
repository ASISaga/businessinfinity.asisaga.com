_schema:
  version: "3.0"
  type: page_manifest
  page_path: /enterprise/
  title: "Business Infinity — The boardroom that never adjourns"
  description: "From episodic decisions to shared orchestration. Cross the threshold with a persistent AI boardroom that earns trust in production."
  layout: default

sections:
  - id: hero
    component: hero-enterprise
    intent: attract
    source:
      headline: "Stop managing the gaps"
      subhead_line1: "The silent tax isn't in your ERP, MES, CRM, or planning tools."
      subhead_line2: "It's in the space between them."
      cta_primary:
        label: Cross the threshold
        url: "#threshold"
      cta_secondary:
        label: See how it earns trust
        url: "#risk"

  - id: intro
    component: beats
    intent: empathise
    entity_collection: pain_points
    entity_ref: enterprise-pain-signals

  - id: flow
    component: comparison
    intent: persuade
    entity_collection: pain_points
    entity_ref: enterprise-lag

  - id: tenets
    component: principles
    intent: persuade
    entity_collection: principles
    entity_ref: enterprise-irreversibles

  - id: network
    component: pills-section
    intent: persuade
    entity_collection: propositions
    entity_ref: network-enterprise

  - id: levers
    component: kpi-grid
    intent: persuade
    entity_collection: evidence
    entity_refs:
      - kpi-revenue-margin
      - kpi-cost-to-serve
      - kpi-working-capital
    source:
      heading: The hard levers

  - id: risk
    component: risk
    intent: reassure
    entity_collection: guarantees
    entity_refs:
      - read-only
      - approvals
      - rollback
      - audit-log
    source:
      heading: Risk is a design variable
      intro: "Before Infinity ever writes back to your systems, it proves itself under:"
      callout: "You don't trust it into production — you"
      callout_accent: "watch it earn its way"
      callout_end: "."

  - id: threshold
    component: threshold
    intent: convert
    entity_collection: actions
    entity_ref: pilot-enterprise

  - id: invite
    component: quote
    intent: convert
    source:
      text: "You've already felt the drag. The question is whether you keep paying it. The future is already running — the invitation is to join it."
      back_label: Back to top
      back_url: "#skip-target"
