<section class="section">
    <div class="wrap">
        <div class="beats reveal">
            {% for beat in site.data.startup2.beats.items %}
            <p class="beat">{{ beat }}</p>
            {% endfor %}
        </div>
        <p class="lead reveal">
            {{ site.data.startup2.beats.body_prefix }} <span class="accent">{{ site.data.startup2.beats.body_accent }}</span> {{ site.data.startup2.beats.body_suffix }}
        </p>
    </div>
</section>
