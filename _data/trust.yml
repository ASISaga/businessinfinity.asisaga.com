overview:
  _meta:
    content_type: trust_overview
    intent: reassure
    audience: [enterprise, startup]
    funnel_stage: decision
    priority: critical
  heading: Trust Center
  lead: At Business Infinity, trust is not a marketing claim — it is a measurable
    outcome of transparency, reliability, and accountability.
  quote: Trust is earned through evidence, not claimed through words.
  attribution: Our guiding principle
  body: This Trust Center provides comprehensive information about our security, compliance,
    and privacy practices. Everything here is backed by concrete implementation, not
    just policy documents.

principles:
  _meta:
    content_type: trust_principle
    intent: reassure
    audience: [enterprise]
    funnel_stage: decision
    priority: high
  heading: Our Trust Principles
  intro: 'We organize our trust commitments across five dimensions:'
  cards:
  - _type: trust_dimension
    icon: 🔍
    title: Product-Level Trust
    dimension: product
    items:
    - _type: trust_commitment
      label: 'Transparency:'
      text: Every decision is explainable with clear audit trails
      domain: observability
    - _type: trust_commitment
      label: 'Reliability:'
      text: Enterprise-grade uptime and performance SLAs
      domain: availability
    - _type: trust_commitment
      label: 'Compliance:'
      text: Aligned with SOC 2, ISO 27001, GDPR, HIPAA
      domain: regulatory
    - _type: trust_commitment
      label: 'User Control:'
      text: You own your data — export, review, or delete anytime
      domain: data_sovereignty
  - _type: trust_dimension
    icon: 📋
    title: Process-Level Trust
    dimension: process
    items:
    - _type: trust_commitment
      label: 'Validation:'
      text: Independent audits and reproducible benchmarks
      domain: verification
    - _type: trust_commitment
      label: 'Risk Management:'
      text: Explicit risk modeling and mitigation
      domain: risk
    - _type: trust_commitment
      label: 'Customer Engagement:'
      text: Transparent roadmaps and feedback loops
      domain: communication

