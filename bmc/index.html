---
layout: default
title: "Business Infinity — Business Model Canvas"
---

<header class="page-header">
  <h1>{{ site.data.bmc.page_title }}</h1>
  <div class="subtitle">{{ site.data.bmc.subtitle }}</div>
</header>

<main>
  <section class="grid">
    {% for section in site.data.bmc.sections %}
    <article data-canvas-position="{{ section.canvas_position }}">
      <h2>{{ section.heading }}</h2>
      <ul data-field>
        {% for item in section.items %}
        <li>{{ item.text }}</li>
        {% endfor %}
      </ul>
    </article>
    {% endfor %}
  </section>

  <section class="actions">
    <button class="primary" onclick="window.print()">Print / Save as PDF</button>
    <button onclick="toggleSample()">Toggle sample content</button>
  </section>
</main>

<script src="{{ '/assets/js/bmc/app.js' | relative_url }}"></script>
