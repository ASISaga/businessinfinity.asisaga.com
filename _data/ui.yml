# =============================================================================
# UI Chrome — Ontological Knowledge Base (Tier 2)
# =============================================================================
# Purpose: Canonical source for all user-interface chrome strings — labels,
# buttons, accessibility text, navigation headings, and form placeholders.
# Templates MUST reference site.data.ui.* for every visible UI string.
#
# Required by: theme's _includes/header.html, _includes/footer.html,
#              _includes/navbar.html, and layout templates.
# =============================================================================

# --- Accessibility (a11y) ----------------------------------------------------
a11y:
  skip_link: "Skip to main content"
  toggle_nav: "Toggle navigation menu"
  menu: "Menu"
  back_to_top: "Back to top"
  scroll_to_content: "Scroll to content"
  primary_nav: "Primary navigation"
  footer_nav: "Footer navigation"
  social_heading: "Connect"
  dismiss_alert: "Dismiss alert"

# --- Navigation Chrome -------------------------------------------------------
nav:
  footer_heading: "Navigate"
  social_heading: "Connect"

# --- Buttons & Actions -------------------------------------------------------
actions:
  learn_more: "Learn More"
  get_started: "Get Started"
  view_demo: "View Demo"
  send_message: "Send Message"
  close: "Close"
  contact_support: "Contact Support"

# --- Pagination --------------------------------------------------------------
pagination:
  previous: "← Previous"
  next: "Next →"
  page: "Page"
  of: "of"

# --- Content States & Feedback ------------------------------------------------
states:
  loading: "Loading..."
  empty_chat: "No messages yet. Start the conversation!"
  success: "Success!"
  error: "Error"
