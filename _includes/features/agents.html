<section id="agents" class="section reveal">
    <h2>{{ site.data.features.agents.heading }}</h2>
    <p>{{ site.data.features.agents.intro }}</p>
    <div class="grid-3">
        {% for agent in site.data.features.agents.roster %}
        <div class="card roster" data-agent-id="{{ agent.agent_id }}" data-domain="{{ agent.domain }}">
            <h3>{{ agent.name }}</h3>
            <ul class="list">
                <li><strong>Scope:</strong> {{ agent.scope }}</li>
                <li><strong>Strength:</strong> {{ agent.strength }}</li>
                <li><strong>Gives you:</strong> {{ agent.gives }}</li>
            </ul>
        </div>
        {% endfor %}
    </div>
</section>
