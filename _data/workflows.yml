# User-facing Business Workflows
# Source: assets/js/boardroom/workflow.js, assets/js/workflow-manager.js
# Backend: ASISaga/BusinessInfinity src/business_infinity/workflows/

# ----- Boardroom UI workflows -----
# Interactive workflows triggered by users from the boardroom panel.
# Each workflow collects parameters via a form before execution.
boardroom_workflows:
  - id: product_launch
    title: Product Launch
    description: "Market analysis → Product strategy → Technical implementation → Financial planning → Launch"
    category: growth
    params:
      - name: product_name
        label: Product Name
        type: text
        required: true
      - name: target_market
        label: Target Market
        type: text
        required: true
      - name: launch_date
        label: Launch Date
        type: text
        placeholder: "2025-Q2"
        required: false

  - id: funding_round
    title: Funding Round
    description: "Financial assessment → Investor outreach → Pitch preparation → Due diligence → Closing"
    category: finance
    params:
      - name: round_type
        label: Round Type
        type: select
        options:
          - Seed
          - Series A
          - Series B
          - Series C
        required: true
      - name: target_amount
        label: Target Amount
        type: number
        required: true
      - name: valuation
        label: Valuation
        type: number
        required: false

  - id: market_analysis
    title: Market Analysis
    description: "Market research → Competitive analysis → Opportunity assessment"
    category: strategy
    params:
      - name: market_segment
        label: Market Segment
        type: text
        required: true
      - name: geography
        label: Geography
        type: text
        required: true
      - name: timeframe
        label: Timeframe
        type: text
        placeholder: "2025"
        required: false

# ----- Agent-led operational workflows -----
# Executed by the WorkflowManager web component via /api/workflows/{id}.
# Each workflow is owned by a primary C-suite agent.
agent_workflows:
  - id: strategic_planning
    title: Strategic Planning
    description: "C-Suite collaborative planning workflow"
    category: strategy
    agents:
      - ceo
      - cfo
      - cmo
      - coo
      - cto
      - cso

  - id: market_analysis
    title: Market Analysis
    description: "CMO-led market research workflow"
    category: marketing
    agents:
      - cmo

  - id: financial_review
    title: Financial Review
    description: "CFO quarterly review workflow"
    category: finance
    agents:
      - cfo

  - id: tech_assessment
    title: Tech Assessment
    description: "CTO technology evaluation workflow"
    category: technology
    agents:
      - cto

  - id: hr_onboarding
    title: HR Onboarding
    description: "CHRO employee onboarding workflow"
    category: operations
    agents:
      - coo

  - id: security_audit
    title: Security Audit
    description: "CSO security review workflow"
    category: security
    agents:
      - cso

  - id: operations_review
    title: Operations Review
    description: "COO operational efficiency workflow"
    category: operations
    agents:
      - coo

# ----- Backend orchestration workflows -----
# Purpose-driven perpetual orchestrations started via Azure Functions.
# Source: src/business_infinity/workflows/orchestrations.py
orchestration_workflows:
  - id: boardroom-session
    title: Boardroom Session
    description: "Primary perpetual autonomous boardroom — all C-suite agents collaborate on strategic decisions, operational reviews, and governance indefinitely"
    purpose: "Run autonomous boardroom with perpetual strategic governance and decision-making"
    purpose_scope: "Full C-suite collaboration, strategic planning, operational reviews, and covenant compliance"
    variant: perpetual
    category: boardroom
    agents:
      - ceo
      - cfo
      - cmo
      - coo
      - cto
      - cso
      - chro
    request_example:
      agenda:
        - "Q1 review"
        - "hiring plan"
      mode: autonomous

  - id: strategic-review
    title: Strategic Review
    description: "Perpetual strategic alignment, review, and improvement across the organisation"
    purpose: "Drive strategic review and continuous organisational improvement"
    purpose_scope: "C-suite strategic alignment and cross-functional coordination"
    variant: perpetual
    category: strategy
    agents:
      - ceo
      - cfo
      - cmo
      - coo
      - cto
      - cso
    request_example:
      quarter: "Q1-2026"
      focus_areas:
        - revenue
        - growth

  - id: market-analysis
    title: Market Analysis
    description: "Continuous market monitoring, competitor analysis, and opportunity identification led by the CMO"
    purpose: "Continuously analyse markets and surface competitive insights"
    purpose_scope: "Market intelligence, competitor monitoring, and opportunity identification"
    variant: hierarchical
    category: marketing
    agents:
      - ceo
      - cmo
    request_example:
      market: "EU SaaS"
      competitors:
        - AcmeCorp
        - Globex

  - id: budget-approval
    title: Budget Approval
    description: "Perpetual budget governance, spend monitoring, and financial decision oversight"
    purpose: "Govern budget allocation and ensure fiscal responsibility"
    purpose_scope: "Financial governance, budget oversight, and resource allocation"
    variant: sequential
    category: finance
    agents:
      - ceo
      - cfo
    request_example:
      department: Marketing
      amount: 500000
      justification: "Q2 campaign"

  - id: risk-assessment
    title: Risk Assessment
    description: "Perpetual risk governance — continuously monitors, assesses, and mitigates enterprise risks"
    purpose: "Continuously monitor, assess, and mitigate enterprise risks"
    purpose_scope: "Risk identification, assessment, mitigation, and governance across all domains"
    variant: perpetual
    category: governance
    agents:
      - cso
      - cto
      - coo
    request_example:
      risk_domain: cybersecurity
      risk_tolerance: moderate

  - id: covenant-compliance
    title: Covenant Compliance
    description: "Perpetual covenant compliance monitoring — ensures all operations comply with governance standards"
    purpose: "Ensure continuous covenant compliance and governance adherence"
    purpose_scope: "Compliance monitoring, audit trail validation, and covenant enforcement"
    variant: perpetual
    category: governance
    agents:
      - ceo
      - coo
      - cso
    request_example:
      compliance_standard: BIC
      scope: global

  - id: talent-management
    title: Talent Management
    description: "Perpetual talent strategy — manages organisational development and HR governance"
    purpose: "Drive talent strategy, organizational development, and workforce optimization"
    purpose_scope: "Talent acquisition, retention, development, culture, and HR governance"
    variant: perpetual
    category: operations
    agents:
      - chro
      - ceo
      - coo
    request_example:
      focus: retention
      departments:
        - engineering
        - marketing

  - id: technology-review
    title: Technology Review
    description: "Perpetual technology review — evaluates technology strategy and engineering excellence"
    purpose: "Drive technology strategy, architecture excellence, and innovation"
    purpose_scope: "Technology roadmap, architecture review, engineering practices, and innovation pipeline"
    variant: perpetual
    category: technology
    agents:
      - cto
      - ceo
      - cso
    request_example:
      focus_areas:
        - cloud
        - ai
        - security
      review_scope: quarterly

# ----- Conversation workflows -----
# Boardroom conversation and A2A messaging workflows.
# Source: src/business_infinity/workflows/conversations.py
conversation_workflows:
  - id: list-conversations
    title: List Conversations
    description: "List boardroom conversations with optional filtering by champion and status"
    category: conversations
    params:
      - name: champion
        label: Champion Agent
        type: text
        required: false
      - name: status
        label: Status
        type: select
        options:
          - open
          - closed
        required: false
      - name: limit
        label: Limit
        type: number
        default: 50
        required: false

  - id: create-conversation
    title: Create Conversation
    description: "Create and start a new boardroom conversation via AOS orchestration"
    category: conversations
    params:
      - name: conversation_type
        label: Conversation Type
        type: text
        required: true
      - name: champion
        label: Champion Agent
        type: text
        required: true
      - name: title
        label: Title
        type: text
        required: true
      - name: content
        label: Content
        type: textarea
        required: true

  - id: sign-conversation
    title: Sign Conversation
    description: "Sign a boardroom conversation with a signer record"
    category: conversations
    params:
      - name: conversation_id
        label: Conversation ID
        type: text
        required: true
      - name: signer_role
        label: Signer Role
        type: text
        required: true
      - name: signer_name
        label: Signer Name
        type: text
        required: true

  - id: create-a2a-message
    title: Agent-to-Agent Message
    description: "Initiate agent-to-agent communication via AOS orchestration"
    category: conversations
    params:
      - name: from_agent
        label: From Agent
        type: text
        required: true
      - name: to_agent
        label: To Agent
        type: text
        required: true
      - name: conversation_type
        label: Conversation Type
        type: text
        required: true
      - name: message
        label: Message
        type: textarea
        required: true

  - id: get-conversation-events
    title: Conversation Events
    description: "Get recent boardroom conversation events for polling updates"
    category: conversations
    params:
      - name: since
        label: Since (ISO 8601)
        type: text
        required: false
      - name: limit
        label: Limit
        type: number
        default: 100
        required: false

# ----- Enterprise capability workflows -----
# Thin-delegate workflows for knowledge, risk, decisions, covenants, and MCP.
# Source: src/business_infinity/workflows/enterprise.py
enterprise_workflows:
  - id: knowledge-search
    title: Knowledge Search
    description: "Full-text search of the AOS knowledge base"
    category: knowledge
    params:
      - name: query
        label: Search Query
        type: text
        required: true
      - name: doc_type
        label: Document Type
        type: text
        required: false
      - name: limit
        label: Result Limit
        type: number
        default: 10
        required: false

  - id: risk-register
    title: Risk Register
    description: "Register a new organisational risk in the AOS risk registry"
    category: governance
    params:
      - name: title
        label: Risk Title
        type: text
        required: true
      - name: description
        label: Description
        type: textarea
        required: true
      - name: category
        label: Category
        type: select
        options:
          - operational
          - financial
          - strategic
          - compliance
          - technology
        required: true
      - name: owner
        label: Risk Owner (Agent ID)
        type: text
        required: true

  - id: risk-assess
    title: Risk Assessment
    description: "Update likelihood and impact scores for a registered risk"
    category: governance
    params:
      - name: risk_id
        label: Risk ID
        type: text
        required: true
      - name: likelihood
        label: Likelihood (0.0–1.0)
        type: number
        required: true
      - name: impact
        label: Impact (0.0–1.0)
        type: number
        required: true

  - id: risk-heatmap
    title: Risk Heatmap
    description: "Get risk heatmap for the boardroom by category"
    category: governance
    params:
      - name: category
        label: Category
        type: text
        required: false

  - id: risk-summary
    title: Risk Summary
    description: "Get aggregate risk summary by category"
    category: governance
    params:
      - name: category
        label: Category
        type: text
        required: false

  - id: log-decision
    title: Log Decision
    description: "Record a boardroom decision in the immutable AOS audit trail"
    category: governance
    params:
      - name: title
        label: Decision Title
        type: text
        required: true
      - name: rationale
        label: Rationale
        type: textarea
        required: true
      - name: agent_id
        label: Deciding Agent ID
        type: text
        required: true

  - id: compliance-report
    title: Compliance Report
    description: "Generate a compliance report for regulatory submissions"
    category: governance
    params:
      - name: start_time
        label: Start Time (ISO 8601)
        type: text
        required: true
      - name: end_time
        label: End Time (ISO 8601)
        type: text
        required: true
      - name: report_type
        label: Report Type
        type: text
        default: decisions
        required: false

  - id: covenant-create
    title: Create Covenant
    description: "Create a formal business covenant between designated parties"
    category: governance
    params:
      - name: title
        label: Covenant Title
        type: text
        required: true
      - name: parties
        label: Parties (comma-separated agent IDs)
        type: text
        required: true

  - id: ask-agent
    title: Ask Agent
    description: "Send a synchronous question to a single named agent and receive an answer"
    category: interaction
    params:
      - name: agent_id
        label: Agent ID
        type: text
        required: true
      - name: message
        label: Question
        type: textarea
        required: true
      - name: context
        label: Context (optional JSON)
        type: textarea
        required: false

  - id: create-alert
    title: Create Alert
    description: "Create a metric alert for threshold-based notifications"
    category: monitoring
    params:
      - name: metric_name
        label: Metric Name
        type: text
        required: true
      - name: threshold
        label: Threshold
        type: number
        required: true
      - name: condition
        label: Condition
        type: select
        options:
          - gt
          - gte
          - lt
          - lte
          - eq
        default: gt
        required: false

  - id: register-webhook
    title: Register Webhook
    description: "Register a webhook for external event notifications"
    category: integration
    params:
      - name: url
        label: Webhook URL
        type: text
        required: true
      - name: events
        label: Events (comma-separated)
        type: text
        required: true

  - id: mcp-orchestration
    title: MCP Orchestration
    description: "Start a C-suite orchestration with MCP server access for ERP and CRM tools"
    category: integration
    agents:
      - ceo
      - cmo
    mcp_servers:
      ceo:
        - erp
      cmo:
        - crm
        - analytics
    params:
      - name: purpose
        label: Orchestration Purpose
        type: text
        required: true
      - name: erp_api_key
        label: ERP API Key
        type: password
        required: true
      - name: crm_token
        label: CRM Token
        type: password
        required: true

# ----- Beyond-SDK enhancement workflows -----
# Advanced capabilities not yet in the AOS Client SDK.
# Source: src/business_infinity/workflows/beyond_sdk.py
beyond_sdk_workflows:
  - id: find-agents
    title: Find Agents
    description: "Find agents by capability requirements with scoring"
    category: discovery
    params:
      - name: required_capabilities
        label: Required Capabilities (comma-separated)
        type: text
        required: false
      - name: preferred_capabilities
        label: Preferred Capabilities (comma-separated)
        type: text
        required: false
      - name: min_score
        label: Minimum Score (0.0–1.0)
        type: number
        default: 0.0
        required: false

  - id: start-orchestration-group
    title: Start Orchestration Group
    description: "Start multiple orchestrations and register them as a named group"
    category: orchestration
    params:
      - name: group_name
        label: Group Name
        type: text
        required: false

  - id: get-group-status
    title: Get Group Status
    description: "Get aggregate status for an orchestration group"
    category: orchestration
    params:
      - name: group_id
        label: Group ID
        type: text
        required: true

  - id: stop-orchestration-group
    title: Stop Orchestration Group
    description: "Stop all orchestrations in a group"
    category: orchestration
    params:
      - name: group_id
        label: Group ID
        type: text
        required: true

  - id: checkpoint-orchestration
    title: Checkpoint Orchestration
    description: "Save a checkpoint for a perpetual orchestration"
    category: orchestration
    params:
      - name: orchestration_id
        label: Orchestration ID
        type: text
        required: true

  - id: resume-orchestration
    title: Resume Orchestration
    description: "Resume a perpetual orchestration from its latest checkpoint"
    category: orchestration
    params:
      - name: orchestration_id
        label: Orchestration ID
        type: text
        required: true
      - name: purpose
        label: Purpose
        type: text
        required: true

  - id: register-conditional-webhook
    title: Register Conditional Webhook
    description: "Register a webhook with an optional event filter"
    category: integration
    params:
      - name: url
        label: Webhook URL
        type: text
        required: true
      - name: events
        label: Events (comma-separated)
        type: text
        required: true

  - id: verify-audit-integrity
    title: Verify Audit Integrity
    description: "Verify the audit trail integrity using SHA-256 hash chain"
    category: governance
    params:
      - name: start_time
        label: Start Time (ISO 8601)
        type: text
        required: false
      - name: end_time
        label: End Time (ISO 8601)
        type: text
        required: false

  - id: start-workflow-chain
    title: Start Workflow Chain
    description: "Start a workflow while advertising its upstream dependencies"
    category: orchestration
    params:
      - name: workflow_name
        label: Workflow Name
        type: text
        required: true

  - id: generate-api-docs
    title: Generate API Docs
    description: "Generate API documentation for all registered workflows"
    category: documentation

