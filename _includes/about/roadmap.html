<section id="roadmap">
    <h3>{{ site.data.about.roadmap.heading }}</h3>
    <div class="card">
        <ol>
            {% for item in site.data.about.roadmap.items %}
            <li data-status="{{ item.status }}" data-phase="{{ item.phase }}">{{ item.text }}</li>
            {% endfor %}
        </ol>
    </div>
</section>
