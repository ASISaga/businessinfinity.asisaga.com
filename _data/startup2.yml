hero:
  headline: Your runway deserves more than guesswork
  subhead: Burn, churn, pivots — you already know the odds. The hidden killer isn't
    just capital; it's decision drag.
  cta_primary:
    label: Cross the threshold
    url: '#threshold'
  cta_secondary:
    label: See how we de‑risk it
    url: '#risk'
beats:
  items:
  - Every late hire.
  - Every lost lead.
  - Every change you saw coming but couldn't act on in time.
  body: Business Infinity closes that gap. Not with advice. Not with a dashboard.
    With a boardroom that never adjourns — tuned to your startup.
  accent: boardroom that never adjourns
orchestration:
  heading: From reaction to orchestration
  today:
    eyebrow: Today
    body: Fire‑drill sprints, gut‑feel trade‑offs, investor decks written on fumes.
  tomorrow:
    eyebrow: Tomorrow
    items:
    - lead: 'Persistent AI C‑suite:'
      text: CEO, CFO, COO agents watching every key metric.
    - lead: 'Action in hours:'
      text: Go from “we should” to “it’s live” before the week flips.
    - lead: 'Investor‑ready ledger:'
      text: Every move, rationale, and result in one place.
    closing: You don't just move faster — you
    closing_accent: compound faster
    closing_end: .
tenets:
  heading: Three truths for founders
  items:
  - index: '01'
    text: Capital is wasted as easily by bad focus as by burn.
  - index: '02'
    text: Every cycle without learning compounds risk.
  - index: '03'
    text: The pitch that wins is backed by provable decisions.
network:
  heading: The network you join
  body: 'Every Infinity‑run startup feeds into a commons: anonymised patterns, tested
    playbooks, battle‑proven evaluators. Your boardroom learns from theirs; theirs
    learns from yours.'
  pills:
  - Shared funding plays
  - Proven GTM moves
  - Hiring that sticks
risk2:
  heading: Zero‑risk adoption
  items:
  - lead: 'Read‑only first:'
    text: Simulate actions on your live data.
  - lead: 'Guardrails:'
    text: Spend caps, experiment limits, rollback anytime.
  - lead: 'Audit:'
    text: Tamper‑evident log for every decision.
  footnote: You don't gamble the runway — you prove the lift before you commit.
threshold2:
  heading: Your threshold step
  intro: 'Pick one pain to kill in 4–6 weeks:'
  items:
  - eyebrow: Lead‑to‑close
    body: Compress your sales cycle; raise win rates without raising spend.
  - eyebrow: Cash burn
    body: Cut waste in tooling, ops, and campaigns without starving growth.
  - eyebrow: Product‑market fit signals
    body: Instrument every test; scale only what wins with data.
  cta:
    label: Design your pilot
    url: mailto:founders@businessinfinity.ai
quote:
  text: You built this to change your market. Don't run it on yesterday's decision
    tempo.
