<section id="security" class="section reveal">
    <h2>{{ site.data.trust.security.heading }}</h2>
    <div class="card">
        <ul>
            {% for item in site.data.trust.security.items %}
            <li data-layer="{{ item.layer }}">{{ item.text }}</li>
            {% endfor %}
        </ul>
    </div>
</section>
