<section id="transparency" class="section reveal">
    <h2>{{ site.data.trust.transparency.heading }}</h2>
    <div class="card">
        <ul>
            {% for item in site.data.trust.transparency.items %}
            <li data-mechanism="{{ item.mechanism }}">{{ item.text }}</li>
            {% endfor %}
        </ul>
    </div>
</section>
