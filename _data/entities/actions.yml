_schema:
  version: "3.0"
  type: entity_collection
  entity_type: action
  description: >
    Calls-to-action, pilot offers, and conversion steps.
    Single source for all CTA copy and pilot structures.
  last_reviewed: 2026-04-11

pilot-enterprise:
  uid: pilot-enterprise
  _type: pilot_offer
  headline: Your threshold step
  intro: "One pilot flow. One measurable, high‑friction process:"
  audience: [enterprise]
  scenarios:
    - uid: pilot-order-to-cash
      _type: pilot_scenario
      eyebrow: Order‑to‑cash
      body: Start with a region or priority segment; measure cycle time, DSO, and SLA lift.
      process_domain: finance
    - uid: pilot-plant-changeover
      _type: pilot_scenario
      eyebrow: Plant changeover
      body: Stabilise windows; reduce variance; protect throughput without overtime spikes.
      process_domain: operations
    - uid: pilot-supplier-lane
      _type: pilot_scenario
      eyebrow: Supplier lane
      body: Capacity and lead‑time realism; fewer expedites; shared sims for what‑ifs.
      process_domain: procurement
  footnote: "4–8 weeks. Continuous deliberation, guarded actions, measured deltas in time, service, cost, and cash."
  cta:
    label: Design your pilot
    url: "mailto:enterprise@businessinfinity.ai"

pilot-startup:
  uid: pilot-startup
  _type: pilot_offer
  headline: Your threshold step
  intro: "Pick one pain to kill in 4–6 weeks:"
  audience: [startup]
  scenarios:
    - uid: pilot-lead-to-close
      _type: pilot_scenario
      eyebrow: Lead‑to‑close
      body: Compress your sales cycle; raise win rates without raising spend.
      process_domain: revenue
    - uid: pilot-cash-burn
      _type: pilot_scenario
      eyebrow: Cash burn
      body: Cut waste in tooling, ops, and campaigns without starving growth.
      process_domain: finance
    - uid: pilot-pmf-signals
      _type: pilot_scenario
      eyebrow: Product‑market fit signals
      body: Instrument every test; scale only what wins with data.
      process_domain: product
  cta:
    label: Design your pilot
    url: "mailto:founders@businessinfinity.ai"

cta-zero-regret:
  uid: cta-zero-regret
  _type: call_to_action
  headline: Cross the threshold with a zero‑regret pilot
  body: >
    4–8 weeks. Read‑only first. Guarded writes where safe.
    Evidence that pays for itself.
  button:
    label: Request a briefing
    url: "mailto:hello@businessinfinity.ai"

cta-enterprise-transform:
