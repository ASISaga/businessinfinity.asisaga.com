<section id="principles" class="section reveal">
    <h2>{{ site.data.trust.principles.heading }}</h2>
    <p>{{ site.data.trust.principles.intro }}</p>
    <div class="grid-2">
        {% for card in site.data.trust.principles.cards %}
        <div class="card">
            <h3>{{ card.icon }} {{ card.title }}</h3>
            <ul>
                {% for item in card.items %}
                <li><strong>{{ item.label }}</strong> {{ item.text }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endfor %}
    </div>
</section>
