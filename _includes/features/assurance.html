<section id="assurance" class="section reveal">
    <h2>{{ site.data.features.assurance.heading }}</h2>
    <div class="grid-3">
        {% for item in site.data.features.assurance.items %}
        <div class="card">
            <h3>{{ item.title }}</h3>
            <p>{{ item.body }}</p>
        </div>
        {% endfor %}
    </div>
</section>
